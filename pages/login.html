<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – GreenRoots</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav__logo">🌿 GreenRoots</a>
    <ul class="nav__links">
      <li><a href="products.html">Shop</a></li>
      <li><a href="subscription.html">Subscribe</a></li>
      <li><a href="recipes.html">Recipes</a></li>
      <li><a href="delivery.html">Delivery</a></li>
    </ul>
    <div class="nav__actions">
      <a href="cart.html" class="btn btn--cart">🛒 <span id="cartCount">0</span></a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box" id="loginBox">
      <h2>Welcome back</h2>
      <p>Sign in to your GreenRoots account to manage orders and subscriptions.</p>
      <div class="form-group"><label>Email address</label><input type="email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Your password" /></div>
      <button class="btn btn--primary btn--full" onclick="handleLogin()">Sign in</button>
      <div class="auth-switch">Don't have an account? <a href="#" onclick="toggleForm()">Create one →</a></div>
    </div>

    <div class="auth-box" id="registerBox" style="display:none;">
      <h2>Create account</h2>
      <p>Join GreenRoots to start your organic grocery journey.</p>
      <div class="form-group"><label>Full name</label><input type="text" placeholder="Jane Smith" /></div>
      <div class="form-group"><label>Email address</label><input type="email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Choose a password" /></div>
      <div class="form-group"><label>Suburb / Postcode</label><input type="text" placeholder="e.g. Surry Hills 2010" /></div>
      <button class="btn btn--primary btn--full" onclick="handleRegister()">Create account</button>
      <div class="auth-switch">Already have an account? <a href="#" onclick="toggleForm()">Sign in →</a></div>
    </div>
  </div>

  <script src="../js/data.js"></script><script src="../js/app.js"></script>
  <script>
    function toggleForm() {
      const l = document.getElementById('loginBox'), r = document.getElementById('registerBox');
      l.style.display = l.style.display === 'none' ? 'block' : 'none';
      r.style.display = r.style.display === 'none' ? 'block' : 'none';
    }
    function handleLogin() {
      showToast('Signed in successfully! 👋');
      setTimeout(() => window.location.href = 'products.html', 1200);
    }
    function handleRegister() {
      showToast('Account created! Welcome to GreenRoots 🌿');
      setTimeout(() => window.location.href = 'products.html', 1200);
    }
  </script>
</body>
</html>
